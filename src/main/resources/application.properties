spring.application.name=shantifanrender

# MySQL Database Configuration
server.port=${PORT:8080}

# In production (Render), you must provide these env vars:
# - SPRING_DATASOURCE_URL
# - SPRING_DATASOURCE_USERNAME
# - SPRING_DATASOURCE_PASSWORD
#
# Local dev default keeps localhost:3306.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shantifanrender?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Avoid failing immediately if DB takes a moment to come up (common on deploy platforms)
spring.datasource.hikari.initialization-fail-timeout=0

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# If DB is unreachable at startup (common on deploy), Hibernate may fail while
# trying to detect dialect/metadata. These settings allow the web server to
# start and bind to PORT; DB-dependent endpoints will still error until DB works.
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=${HIBERNATE_ALLOW_JDBC_METADATA_ACCESS:false}
